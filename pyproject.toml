[tool.pytest.ini_options]
minversion = "6.0"
addopts = "-ra -q "
pythonpath = ["."]
testpaths = [
    "tests/gpu",
    "tests/iluvatar_gpu",
    "tests/npu",
    "tests/xpu",
]
python_files = [
    "test.py",
    "test_*.py"
]
filterwarnings = [
    "ignore::UserWarning",
    'ignore::DeprecationWarning',
]

[tool.isort]
profile = 'black'
known_third_party = ["paddle"]
skip = []

[tool.black]
line-length = 119
target_version = ['py35', 'py36', 'py37', 'py38', 'py39', 'py310']
exclude = []

[tool.pytest.ini_options]
minversion = "6.0"
addopts = "-ra -q "
pythonpath = ["."]
testpaths = [
    "tests/gpu",
    "tests/iluvatar_gpu",
    "tests/npu",
    "tests/xpu",
]
python_files = [
    "test.py",
    "test_*.py"
]
filterwarnings = [
    "ignore::UserWarning",
    'ignore::DeprecationWarning',
]
